<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080808">
<title>Dancab - Inicio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/UI.css">
</head>
<body>
<div class="app">

  <div class="screen on">
    <!-- TOPBAR ORIGINAL -->
    <div class="topbar">
      <div style="font-weight:800;font-size:26px;color:var(--acc);letter-spacing:-0.5px;">Dancab</div>
       <div style="text-align:right">
        <div id="greeting" style="font-size:11px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:0.5px"></div>
        <div id="top-date" style="font-size:13px;color:var(--t2);font-weight:600"></div>
      </div>
    </div>

    <div class="scroll">
      <!-- 1. RECUADRO ÚNICO EXTENDIDO -->
      <div style="margin-bottom: 16px;">
        <div class="card card-full" style="text-align: center; padding: 24px;">
            <div id="home-pending-count" style="font-size: 48px; font-weight: 800; margin-bottom: 8px;">0</div>
            <div style="font-size: 12px; color: var(--t3); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;">Eventos Pendientes para Hoy</div>
        </div>
      </div>

      <!-- CALENDARIO GYM -->
      <div class="card card-full" onclick="window.location.href='gym.html'" style="cursor:pointer">
        <div class="card-header" style="margin-bottom: 12px;">
            <span class="card-title" style="margin-bottom:0">CALENDARIO GYM</span>
            <div style="display:flex;gap:10px;align-items:center;">
               <button class="btn btn-sm" onclick="event.stopPropagation(); changeGymMonth(-1)">◀</button>
               <span id="gym-cal-month" style="font-size:12px;font-weight:700;min-width:90px;text-align:center;color:var(--t1)">-</span>
               <button class="btn btn-sm" onclick="event.stopPropagation(); changeGymMonth(1)">▶</button>
            </div>
        </div>
        <div id="home-gym-calendar" style="display:grid; grid-template-columns:repeat(7, 1fr); gap:8px 4px; text-align:center;"></div>
      </div>

      <!-- 2. LISTA DE TAREAS DE HOY SINCRONIZADA -->
      <div class="card card-full" style="margin-top: 16px;">
        <div class="card-header" style="margin-bottom: 12px;">
            <span class="card-title" style="margin-bottom:0;">HOY</span>
            <button class="btn btn-sm" style="background:var(--bg3); color:var(--t1);" onclick="window.location.href='calendario.html'">+ Evento</button>
        </div>
        <!-- Aquí se inyectarán las tareas sin el "undefined" -->
        <div id="home-tasks-list"></div>
      </div>

      <!-- FINANZAS (DISEÑO ORIGINAL + BOTÓN AÑADIR) -->
      <div class="card card-full" onclick="window.location.href='finanzas.html'" style="cursor:pointer">
        <div class="card-header" style="margin-bottom: 4px;">
            <span class="card-title" style="margin-bottom: 0;">FINANZAS</span>
            <button class="btn btn-sm" style="background:var(--acc); color:#fff; font-weight:800;" onclick="event.stopPropagation(); openModal('modal-fin-home')">+ Añadir</button>
        </div>
        
        <div style="text-align: center; margin: 10px 0;">
            <div style="font-size: 11px; color: var(--t3); font-weight: 700; letter-spacing: 0.5px;">DISPONIBLE</div>
            <div class="big-bal" id="home-fin-avail" style="font-size:42px;">€0</div>
        </div>

        <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:6px; margin-top:16px">
          <div style="background:rgba(39,174,96,.07); border-radius:10px; padding:8px; text-align:center;">
            <div style="font-size:8px; color:var(--t3); font-weight:700;">ING.</div>
            <div style="font-size:11px; font-weight:700; color:var(--grn)" id="home-fin-inc">€0</div>
          </div>
          <div style="background:rgba(231,76,60,.07); border-radius:10px; padding:8px; text-align:center;">
            <div style="font-size:8px; color:var(--t3); font-weight:700;">GAS.</div>
            <div style="font-size:11px; font-weight:700; color:var(--red)" id="home-fin-exp">€0</div>
          </div>
          <div style="background:rgba(59,130,246,.07); border-radius:10px; padding:8px; text-align:center;">
            <div style="font-size:8px; color:var(--t3); font-weight:700;">AHO.</div>
            <div style="font-size:11px; font-weight:700; color:var(--blu)" id="home-fin-sav">€0</div>
          </div>
          <div style="background:rgba(245,158,11,.07); border-radius:10px; padding:8px; text-align:center;">
            <div style="font-size:8px; color:var(--t3); font-weight:700;">INV.</div>
            <div style="font-size:11px; font-weight:700; color:var(--yel)" id="home-fin-inv">€0</div>
          </div>
        </div>
      </div>

      <!-- CARTERA -->
      <div class="card card-full" onclick="window.location.href='cartera.html'" style="cursor:pointer">
        <div class="card-title">VALOR CARTERA</div>
        <div class="big-bal" id="home-port-total" style="font-size:28px;">€0</div>
        <div style="margin-top:8px;display:flex;gap:10px;align-items:center;">
           <span style="font-size:13px;color:var(--t2)">Invertido: <span id="home-port-inv" style="color:var(--t1)">€0</span></span>
           <span id="home-port-pnl" style="font-size:13px;font-weight:700;">+€0 (0%)</span>
        </div>
      </div>

      <!-- SINCRONIZACIÓN (DISEÑO ORIGINAL DE BOTONES ANCHOS) -->
      <div class="card card-full">
        <div class="card-title">SINCRONIZACIÓN EN LA NUBE ☁️</div>
        <div style="display:flex;gap:10px;margin-top:10px">
           <button class="btn" style="flex:1; background:var(--bg3); font-weight:700;" onclick="cloudSync('up', event)">⬆️ Subir</button>
           <button class="btn" style="flex:1; background:var(--bg3); font-weight:700;" onclick="cloudSync('down', event)">⬇️ Bajar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- NAVEGACIÓN -->
  <nav class="nav">
    <button class="nav-btn on" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">Inicio</span></button>
    <button class="nav-btn" onclick="window.location.href='calendario.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Calendario</span></button>
    <button class="nav-btn" onclick="window.location.href='finanzas.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span class="nav-label">Finanzas</span></button>
    <button class="nav-btn" onclick="window.location.href='cartera.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">Cartera</span></button>
    <button class="nav-btn" onclick="window.location.href='gym.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M3 9h18M3 15h18"/></svg><span class="nav-label">Gym</span></button>
  </nav>

  <!-- MODAL FINANZAS -->
  <div class="overlay" id="modal-fin-home" onclick="closeModal('modal-fin-home',event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" style="margin-bottom:20px;">Añadir registro</div>
      <label class="form-label">Tipo</label>
      <select id="fin-type-home" class="form-input"><option value="ingreso">Ingreso</option><option value="gasto">Gasto</option></select>
      <label class="form-label">Importe (€)</label>
      <input type="number" id="fin-amount-home" class="form-input" placeholder="0.00" step="0.01">
      <label class="form-label">Descripción</label>
      <input type="text" id="fin-desc-home" class="form-input" placeholder="...">
      <label class="form-label">Categoría</label>
      <select id="fin-cat-home" class="form-input">
        <option value="nómina">Nómina</option><option value="ahorro">Ahorro</option><option value="inversión">Inversión</option><option value="otro">Otro</option>
      </select>
      <label class="form-label">Fecha</label>
      <input type="date" id="fin-date-home" class="form-input">
      <button class="btn btn-primary" style="margin-top:16px; width:100%;" onclick="addFinEntryHome()">Guardar</button>
    </div>
  </div>

  <!-- MODAL PIN NUBE -->
  <div class="overlay" id="modal-pin" onclick="closeModal('modal-pin',event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Introduce tu PIN</div>
      <input type="password" id="cloud-pin-input" class="form-input" placeholder="****" inputmode="numeric">
      <button class="btn btn-primary" style="width:100%" onclick="submitPin()">Confirmar</button>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
</div>

<script src="js/main.js?v=46"></script>
<script src="js/nube.js?v=46"></script>
<script>
  function addFinEntryHome() {
    const type = document.getElementById('fin-type-home').value;
    const amount = parseFloat(document.getElementById('fin-amount-home').value);
    const desc = document.getElementById('fin-desc-home').value.trim();
    const cat = document.getElementById('fin-cat-home').value;
    const date = document.getElementById('fin-date-home').value || (typeof today === 'function' ? today() : '');
    if(!amount || !desc) return showToast('Rellena importe y descripción', 'error');
    const entry = { id: (typeof uid === 'function' ? uid() : Date.now()), type, amount, desc, cat, date };
    if(!S.savings) S.savings = []; if(!S.investments) S.investments = [];
    if(!S.incomes) S.incomes = []; if(!S.expenses) S.expenses = [];
    if(cat === 'ahorro') S.savings.push(entry);
    else if(cat === 'inversión') S.investments.push(entry);
    else (type === 'ingreso' ? S.incomes.push(entry) : S.expenses.push(entry));
    save(); closeModal('modal-fin-home'); if (typeof init === 'function') init(); 
    showToast('Registro guardado ✅', 'success');
  }
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof init === 'function') init();
    const dateInput = document.getElementById('fin-date-home');
    if (dateInput && typeof today === 'function') dateInput.value = today();
  });
</script>
</body>
</html>
