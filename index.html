<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080808">
<title>Dancab - Inicio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/UI.css">
</head>
<body>
<div class="app">

  <div class="screen on">
    <div class="topbar">
      <div style="font-weight:700;font-size:24px;color:var(--acc)">Dancab</div>
      <div id="greeting" style="font-size:12px;color:var(--t2)">Cargando...</div>
    </div>

    <div class="scroll">
      <!-- DASHBOARD SUPERIOR -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
         <div class="card" style="text-align:center;margin-bottom:0">
            <div style="font-size:28px;font-weight:700">0</div>
            <div style="font-size:11px;color:var(--t2)">Eventos pendientes</div>
         </div>
         <div class="card" style="text-align:center;margin-bottom:0">
            <div style="font-size:28px;font-weight:700">0 🔥</div>
            <div style="font-size:11px;color:var(--t2)">Racha días</div>
         </div>
      </div>

      <!-- CALENDARIO GYM MENSUAL -->
      <div class="card" onclick="window.location.href='gym.html'" style="cursor:pointer">
         <div class="card-header" style="margin-bottom:16px;">
            <span class="card-title">CALENDARIO GYM</span>
            <div style="display:flex;gap:10px;align-items:center;">
               <button class="btn btn-sm" onclick="event.stopPropagation(); changeGymMonth(-1)">◀</button>
               <span id="gym-cal-month" style="font-size:12px;font-weight:600;min-width:80px;text-align:center;">-</span>
               <button class="btn btn-sm" onclick="event.stopPropagation(); changeGymMonth(1)">▶</button>
            </div>
         </div>
         <div id="home-gym-calendar" style="display:grid; grid-template-columns:repeat(7, 1fr); gap:8px 4px; text-align:center;"></div>
      </div>

      <!-- EVENTOS HOY -->
      <div class="card">
         <div class="card-header"><span class="card-title">HOY</span><button class="btn btn-sm" onclick="window.location.href='calendario.html'">+ Evento</button></div>
         <div id="home-events-list"></div>
      </div>

      <!-- FINANZAS DASHBOARD -->
      <div class="card" onclick="window.location.href='finanzas.html'" style="cursor:pointer">
         <div class="card-title">FINANZAS</div>
         <div style="text-align:center; margin-bottom:20px;">
            <div style="font-size:11px; color:var(--t2); text-transform:uppercase; font-weight:700;">Disponible</div>
            <div class="big-bal" id="home-fin-avail" style="font-size:36px;">€0</div>
         </div>
         <div style="display:grid;grid-template-columns:repeat(4, 1fr);gap:6px;">
            <div style="background:rgba(39,174,96,.07);border-radius:10px;padding:8px;text-align:center;">
               <div style="font-size:8px;color:var(--t3);font-weight:700;">ING.</div>
               <div style="font-size:12px;font-weight:700;color:var(--grn)" id="home-fin-inc">€0</div>
            </div>
            <div style="background:rgba(231,76,60,.07);border-radius:10px;padding:8px;text-align:center;">
               <div style="font-size:8px;color:var(--t3);font-weight:700;">GAS.</div>
               <div style="font-size:12px;font-weight:700;color:var(--red)" id="home-fin-exp">€0</div>
            </div>
            <div style="background:rgba(59,130,246,.07);border-radius:10px;padding:8px;text-align:center;">
               <div style="font-size:8px;color:var(--t3);font-weight:700;">AHO.</div>
               <div style="font-size:12px;font-weight:700;color:var(--blu)" id="home-fin-sav">€0</div>
            </div>
            <div style="background:rgba(245,158,11,.07);border-radius:10px;padding:8px;text-align:center;">
               <div style="font-size:8px;color:var(--t3);font-weight:700;">INV.</div>
               <div style="font-size:12px;font-weight:700;color:var(--yel)" id="home-fin-inv">€0</div>
            </div>
         </div>
      </div>

      <!-- CARTERA DASHBOARD -->
      <div class="card" onclick="window.location.href='cartera.html'" style="cursor:pointer">
         <div class="card-title">VALOR CARTERA</div>
         <div class="big-bal" id="home-port-total" style="font-size:24px;">€0</div>
         <div style="margin-top:8px;display:flex;gap:10px;align-items:center;">
           <span style="font-size:13px;color:var(--t2)">Invertido: <span id="home-port-inv" style="color:var(--t1)">€0</span></span>
           <span id="home-port-pnl" style="font-size:13px;font-weight:600;">+€0 (0%)</span>
         </div>
      </div>

      <!-- SINCRONIZACIÓN -->
      <div class="card card-full">
         <div class="card-title">SINCRONIZACIÓN EN LA NUBE ☁️</div>
         <div style="display:flex;gap:10px;margin-top:10px">
            <button class="btn" style="flex:1" onclick="cloudSync('up')">⬆️ Subir</button>
            <button class="btn" style="flex:1" onclick="cloudSync('down')">⬇️ Bajar</button>
         </div>
      </div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn on" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">Inicio</span></button>
    <button class="nav-btn" onclick="window.location.href='calendario.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Calendario</span></button>
    <button class="nav-btn" onclick="window.location.href='finanzas.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span class="nav-label">Finanzas</span></button>
    <button class="nav-btn" onclick="window.location.href='cartera.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">Cartera</span></button>
    <button class="nav-btn" onclick="window.location.href='gym.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M3 9h18M3 15h18"/></svg><span class="nav-label">Gym</span></button>
  </nav>
</div>
<script src="js/main.js?v=19"></script>
<script>document.addEventListener('DOMContentLoaded', init);</script>
</body>
</html>
