<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080808">
<title>Dancab - Inicio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/UI.css">
</head>
<body>
<div class="app">

  <div class="screen on">
    <div class="topbar">
      <div><div class="logo">Dan<b>cab</b></div><div style="font-size:13px;color:var(--t2);margin-top:3px" id="greeting"></div></div>
    </div>
    <div class="scroll">
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num" id="home-tasks">0</div><div class="stat-sub">Eventos pendientes</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--yel)" id="home-streak">0🔥</div><div class="stat-sub">Racha días</div></div>
      </div>
      
      <div class="card">
        <div class="card-header"><span class="card-title">Calendario Gym</span><span id="home-gym-today" class="tag tag-t3">Hoy: No</span></div>
        <div id="home-calendar-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; margin-top: 10px;"></div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Hoy</span><button class="btn btn-sm" onclick="openModal('modal-task')">+ Evento</button></div>
        <div id="home-task-list"><div class="empty">Sin eventos hoy</div></div>
      </div>

      <div class="card" onclick="window.location.href='finanzas.html'" style="cursor:pointer">
        <div class="card-title">Finanzas del mes</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div><div style="font-size:11px;color:var(--t3);margin-bottom:4px">INGRESOS</div><div style="font-size:22px;font-weight:700;color:var(--grn)" id="home-inc">€0</div></div>
          <div><div style="font-size:11px;color:var(--t3);margin-bottom:4px">GASTOS</div><div style="font-size:22px;font-weight:700;color:var(--red)" id="home-exp">€0</div></div>
        </div>
      </div>
      
      <div class="card">
        <div class="card-title">Sincronización en la Nube ☁️</div>
        <div style="display: flex; gap: 10px;">
          <button class="btn btn-sm" style="flex: 1;" onclick="syncAction('upload', event)">⬆️ Subir</button>
          <button class="btn btn-sm" style="flex: 1;" onclick="syncAction('download', event)">⬇️ Bajar</button>
        </div>
      </div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn on" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">Inicio</span></button>
    <button class="nav-btn" onclick="window.location.href='calendario.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Calendario</span></button>
    <button class="nav-btn" onclick="window.location.href='finanzas.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span class="nav-label">Finanzas</span></button>
    <button class="nav-btn" onclick="window.location.href='cartera.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">Cartera</span></button>
    <button class="nav-btn" onclick="window.location.href='gym.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 5v14M18 5v14M3 9h18M3 15h18"/></svg><span class="nav-label">Gym</span></button>
  </nav>

  <!-- Modal Tarea / Evento -->
  <div class="overlay" id="modal-task" onclick="closeModal('modal-task',event)">
    <div class="modal">
      <div class="modal-handle"></div><div class="modal-title">Nuevo evento</div>
      <div class="form-row"><div><div class="form-label">Nombre</div><input type="text" id="t-name" placeholder="Título del evento..."></div></div>
      <div class="form-row" style="margin-top:10px">
        <div><div class="form-label">Categoría</div><select id="t-cat"><option value="trabajo">Trabajo</option><option value="clases">Clases</option><option value="exámenes">Exámenes</option><option value="gym">Gym</option><option value="cumpleaños">Cumpleaños</option><option value="quedadas">Quedadas</option><option value="otro">Otros</option></select></div>
        <div><div class="form-label">Hora (opcional)</div><input type="text" id="t-time" placeholder="09:00"></div>
      </div>
      <div style="margin-top:10px"><div class="form-label">Fecha</div><input type="date" id="t-date"></div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="addTask()">Añadir evento</button>
    </div>
  </div>

  <!-- Modal PIN Nube -->
  <div class="overlay" id="modal-pin" onclick="closeModal('modal-pin',event)">
    <div class="modal"><div class="modal-handle"></div><div class="modal-title">PIN de Seguridad</div><div class="form-label" id="pin-prompt-text">Introduce tu PIN secreto para acceder a la nube:</div><input type="password" id="cloud-pin-input" placeholder="****" style="margin-top: 10px; font-family: var(--mono); letter-spacing: 4px; text-align: center; font-size: 18px;"><button class="btn btn-primary" style="margin-top:16px" onclick="submitPin()">Aceptar</button></div>
  </div>
  <div class="toast-container" id="toast-container"></div>
</div>
<script src="js/main.js"></script><script src="js/nube.js"></script><script src="js/tareas.js"></script><script src="js/finanzas.js"></script>
<script>document.addEventListener('DOMContentLoaded', init);</script>
</body>
</html>
