<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080808">
<title>Dancab - Inicio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/UI.css">
</head>
<body>
<div class="app">

  <div class="screen on">
    <!-- TOPBAR -->
    <div class="topbar" style="display:flex; flex-direction:column; align-items:flex-start; padding-bottom:10px;">
      <div style="font-weight:700;font-size:24px;color:var(--acc)">Dancab</div>
      <div id="greeting" style="font-size:12px;color:var(--t2)">Buenas...</div>
    </div>

    <div class="scroll">
      
      <!-- EVENTOS Y RACHA -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">
         <div class="card" style="text-align:center;margin-bottom:0">
            <div style="font-size:28px;font-weight:700">0</div>
            <div style="font-size:11px;color:var(--t2)">Eventos pendientes</div>
         </div>
         <div class="card" style="text-align:center;margin-bottom:0">
            <div style="font-size:28px;font-weight:700">0 🔥</div>
            <div style="font-size:11px;color:var(--t2)">Racha días</div>
         </div>
      </div>

      <!-- CALENDARIO GYM (Automático) -->
      <div class="card" onclick="window.location.href='gym.html'" style="cursor:pointer">
         <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="card-title" style="margin:0">CALENDARIO GYM</div>
            <div class="tag tag-t3" id="home-gym-status">Hoy: No</div>
         </div>
      </div>

      <!-- HOY -->
      <div class="card">
         <div class="card-header"><span class="card-title">HOY</span><button class="btn btn-sm">+ Evento</button></div>
         <div class="empty">Sin eventos hoy</div>
      </div>

      <!-- FINANZAS TOTALES HISTÓRICAS -->
      <div class="card" onclick="window.location.href='finanzas.html'" style="cursor:pointer">
         <div class="card-title">FINANZAS</div>
         <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;">
            <div>
               <div style="font-size:10px;color:var(--t3);text-transform:uppercase;margin-bottom:4px;font-weight:700;">Ingresos</div>
               <div style="font-size:18px;font-weight:700;color:var(--grn)" id="home-fin-inc">€0</div>
            </div>
            <div>
               <div style="font-size:10px;color:var(--t3);text-transform:uppercase;margin-bottom:4px;font-weight:700;">Gastos</div>
               <div style="font-size:18px;font-weight:700;color:var(--red)" id="home-fin-exp">€0</div>
            </div>
            <div>
               <div style="font-size:10px;color:var(--t3);text-transform:uppercase;margin-bottom:4px;font-weight:700;">Ahorro</div>
               <div style="font-size:18px;font-weight:700;color:var(--blu)" id="home-fin-sav">€0</div>
            </div>
         </div>
      </div>

      <!-- CARTERA (VALOR TOTAL) -->
      <div class="card" onclick="window.location.href='cartera.html'" style="cursor:pointer">
         <div class="card-title">VALOR TOTAL</div>
         <div class="big-bal" id="home-port-total" style="font-size:24px; font-weight:700;">€0</div>
         <div style="margin-top:8px;display:flex;gap:10px;align-items:center;">
           <span style="font-size:13px;color:var(--t2)">Invertido: <span id="home-port-inv" style="color:var(--t1);font-weight:600">€0</span></span>
           <span style="font-size:13px; font-weight:600;" id="home-port-pnl">+€0 (0%)</span>
         </div>
      </div>

      <!-- NUBE -->
      <div class="card">
         <div class="card-title">SINCRONIZACIÓN EN LA NUBE ☁️</div>
         <div style="display:flex;gap:10px;margin-top:10px">
            <button class="btn" style="flex:1">⬆️ Subir</button>
            <button class="btn" style="flex:1">⬇️ Bajar</button>
         </div>
      </div>
      
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn on" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">Inicio</span></button>
    <button class="nav-btn" onclick="window.location.href='calendario.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Calendario</span></button>
    <button class="nav-btn" onclick="window.location.href='finanzas.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span class="nav-label">Finanzas</span></button>
    <button class="nav-btn" onclick="window.location.href='cartera.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">Cartera</span></button>
    <button class="nav-btn" onclick="window.location.href='gym.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 5v14M18 5v14M3 9h18M3 15h18"/></svg><span class="nav-label">Gym</span></button>
  </nav>

</div>
<script src="js/main.js?v=12"></script>
<script>document.addEventListener('DOMContentLoaded', init);</script>
</body>
</html>
