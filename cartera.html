<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080808">
<title>Dancab - Cartera</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/UI.css">
</head>
<body>
<div class="app">
  <div class="screen on">
    <div class="topbar">
      <span class="page-title">Cartera</span>
    </div>
    <div class="scroll">
      
      <!-- VALOR TOTAL -->
      <div class="card card-full">
        <div class="card-title">VALOR TOTAL</div>
        <div class="big-bal" id="port-total">€0</div>
        <div style="margin-top:8px; display:flex; gap:10px;">
           <span style="font-size:13px;color:var(--t2)">Invertido: <span id="port-invested" style="color:var(--t1)">€0</span></span>
           <span id="port-pnl" style="font-size:13px;font-weight:700;">+€0 (0%)</span>
        </div>
      </div>

      <!-- GRÁFICOS APILADOS CON LEYENDA CUSTOMIZADA -->
      <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:14px;" class="card-full">
         <div class="card" style="margin-bottom:0;">
            <div class="card-title">POR TIPO</div>
            <div style="display:flex; align-items:center; height:160px; gap:16px;">
                <div style="position:relative; flex:1; height:100%;"><canvas id="chart-type"></canvas></div>
                <div id="legend-type" style="width:110px; overflow-y:auto; max-height:100%; display:flex; flex-direction:column; gap:12px; padding-right:4px;"></div>
            </div>
         </div>
         <div class="card" style="margin-bottom:0;">
            <div class="card-title">POR ACTIVO</div>
            <div style="display:flex; align-items:center; height:160px; gap:16px;">
                <div style="position:relative; flex:1; height:100%;"><canvas id="chart-asset"></canvas></div>
                <div id="legend-asset" style="width:110px; overflow-y:auto; max-height:100%; display:flex; flex-direction:column; gap:12px; padding-right:4px;"></div>
            </div>
         </div>
      </div>

      <!-- TUS POSICIONES -->
      <div class="card card-full">
        <div class="card-header" style="margin-bottom: 16px;">
            <span class="card-title" style="margin-bottom: 0;">TUS POSICIONES</span>
            <button class="btn btn-sm" onclick="openNewStockModal()">+ Posición</button>
        </div>
        <div id="stock-list"><div class="empty">Sin posiciones</div></div>
      </div>

    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">Inicio</span></button>
    <button class="nav-btn" onclick="window.location.href='calendario.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Calendario</span></button>
    <button class="nav-btn" onclick="window.location.href='finanzas.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span class="nav-label">Finanzas</span></button>
    <button class="nav-btn on" onclick="window.location.href='cartera.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">Cartera</span></button>
    <button class="nav-btn" onclick="window.location.href='gym.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M3 9h18M3 15h18"/></svg><span class="nav-label">Gym</span></button>
  </nav>

  <!-- MODAL: NUEVA POSICIÓN -->
  <div class="overlay" id="modal-stock" onclick="closeModal('modal-stock',event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" style="margin-bottom:20px;">Nueva posición</div>
      
      <label class="form-label">Ticker</label>
      <input type="text" id="s-ticker" class="form-input" placeholder="Ej: AAPL, VOO, BTC...">
      
      <label class="form-label">Nombre</label>
      <input type="text" id="s-name" class="form-input" placeholder="Ej: Apple Inc.">
      
      <label class="form-label">Dinero Invertido (€)</label>
      <input type="number" id="s-invested" class="form-input" placeholder="Ej: 50.00" step="0.01">
      
      <label class="form-label">Precio de Compra (€)</label>
      <input type="number" id="s-price" class="form-input" placeholder="Ej: 10.00" step="0.01">
      
      <label class="form-label">Precio actual en Mercado (€)</label>
      <input type="number" id="s-current" class="form-input" placeholder="Ej: 15.00" step="0.01">
      
      <label class="form-label">Tipo</label>
      <select id="s-type" class="form-input">
        <option value="Acción">Acción</option>
        <option value="ETF">ETF</option>
        <option value="Crypto">Crypto</option>
        <option value="Fondos">Fondos</option>
        <option value="Bonos">Bonos</option>
        <option value="Materias primas">Materias primas</option>
        <option value="Otro">Otro</option>
      </select>
      
      <button class="btn btn-primary" style="margin-top:10px; width:100%;" onclick="addStock()">Crear Posición</button>
    </div>
  </div>

  <!-- MODAL: GESTIONAR -->
  <div class="overlay" id="modal-manage-stock" onclick="closeModal('modal-manage-stock',event)">
    <div class="modal" id="manage-stock-content"></div>
  </div>

  <div class="overlay" id="modal-confirm" onclick="cancelConfirm(event)">
    <div class="modal" style="padding-bottom: 24px;">
      <div class="modal-handle"></div>
      <div class="modal-title" id="confirm-title" style="color: var(--red);">¿Estás seguro?</div>
      <div class="form-label" id="confirm-message" style="margin-bottom: 20px; text-transform: none; font-size: 14px; color: var(--t1); letter-spacing: normal;">¿Quieres borrar esto?</div>
      <div class="form-row" style="display:flex; gap:10px;">
        <button class="btn" style="background:var(--bg3); color:var(--t1); flex:1;" onclick="cancelConfirm(event, true)">Cancelar</button>
        <button class="btn" style="background:var(--red); color:#fff; flex:1;" onclick="executeConfirm()">Borrar</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
</div>
<script src="js/main.js?v=42"></script>
<script src="js/cartera.js?v=42"></script>
<script>document.addEventListener('DOMContentLoaded', init);</script>
</body>
</html>
