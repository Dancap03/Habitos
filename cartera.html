<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080808">
<title>Dancab - Cartera</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/UI.css">
<link rel="stylesheet" href="css/cartera.css">
</head> 
<body>
<div class="app">

  <div class="screen on">
    <div class="topbar">
      <span class="page-title">Cartera</span>
      <div class="topbar-right"><button class="btn btn-sm" onclick="openModal('modal-stock')">+ Acción</button></div>
    </div>
    <div class="scroll">
      <div class="card">
        <div class="card-title">Valor total</div>
        <div class="big-bal" id="port-total">€0</div>
        <div style="margin-top:8px;display:flex;gap:10px">
          <span style="font-size:13px;color:var(--t2)">Invertido: <span id="port-inv" style="color:var(--t1);font-weight:600">€0</span></span>
          <span style="font-size:13px" id="port-pnl">+€0 (0%)</span>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Distribución</div>
        <div style="display:flex;align-items:center;gap:16px">
          <div style="position:relative;width:100px;height:100px;flex-shrink:0"><canvas id="donutChart" width="100" height="100"></canvas></div>
          <div id="port-legend" style="flex:1;font-size:12px"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Posiciones</div>
        <div id="stock-list"><div class="empty">Sin posiciones</div></div>
      </div>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">Inicio</span></button>
    <button class="nav-btn" onclick="window.location.href='calendario.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Calendario</span></button>
    <button class="nav-btn" onclick="window.location.href='finanzas.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span class="nav-label">Finanzas</span></button>
    <button class="nav-btn on" onclick="window.location.href='cartera.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">Cartera</span></button>
    <button class="nav-btn" onclick="window.location.href='gym.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 5v14M18 5v14M3 9h18M3 15h18"/></svg><span class="nav-label">Gym</span></button>
  </nav>

  <!-- Modales Cartera -->
  <div class="overlay" id="modal-stock" onclick="closeModal('modal-stock',event)">
    <div class="modal"><div class="modal-handle"></div><div class="modal-title">Nueva posición</div>
      <div class="form-row"><div><div class="form-label">Ticker</div><input type="text" id="st-ticker" placeholder="AAPL, VOO..."></div><div><div class="form-label">Nombre</div><input type="text" id="st-name" placeholder="Apple Inc."></div></div>
      <div class="form-row" style="margin-top:10px"><div><div class="form-label">Dinero Invertido (€)</div><input type="number" id="st-invested" placeholder="Ej: 50.00" step="0.01"></div><div><div class="form-label">Precio de Compra (€)</div><input type="number" id="st-buy-price" placeholder="Ej: 10.00" step="0.01"></div></div>
      <div class="form-row" style="margin-top:10px"><div><div class="form-label">Precio actual en Mercado (€)</div><input type="number" id="st-price" placeholder="180.00" step="0.01"></div><div><div class="form-label">Tipo</div><select id="st-type"><option value="accion">Acción</option><option value="etf">ETF</option><option value="crypto">Crypto</option><option value="bono">Bono</option><option value="otro">Otro</option></select></div></div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="addStock()">Crear Posición</button>
    </div>
  </div>

  <div class="overlay" id="modal-stock-edit" onclick="closeModal('modal-stock-edit',event)">
    <div class="modal" style="padding-bottom: 24px;"><div class="modal-handle"></div><div class="modal-title" id="edit-stock-title">Gestionar Posición</div>
      <input type="hidden" id="edit-st-id">
      <div class="card" style="margin-bottom:12px; padding:12px;">
        <div class="form-label">Actualizar Precio Actual (€)</div>
        <div class="form-row" style="margin-bottom:0;"><input type="number" id="edit-st-price" placeholder="0.00" step="0.01"><button class="btn" style="background:var(--acc); color:#fff; border-radius:10px; font-weight:600; padding:0 14px;" onclick="saveStockPrice()">Actualizar</button></div>
      </div>
      <div class="card" style="margin-bottom:12px; padding:12px;">
        <div class="form-label">Añadir Nueva Compra</div>
        <div class="form-row" style="margin-bottom:0;"><input type="number" id="edit-st-buy-invested" placeholder="Inversión (€)" step="0.01"><input type="number" id="edit-st-buy-price" placeholder="Precio compra (€)" step="0.01"><button class="btn" style="background:var(--grn); color:#fff; border-radius:10px; font-weight:600; padding:0 14px;" onclick="addStockPurchase()">Añadir</button></div>
      </div>
      <div class="card-title" style="margin-top:16px;">Tus Compras (Lotes)</div>
      <div id="edit-stock-purchases" style="max-height: 250px; overflow-y: auto; padding-right:4px;"></div>
    </div>
  </div>
  <div class="toast-container" id="toast-container"></div>
</div>
<script src="js/main.js"></script><script src="js/cartera.js"></script>
<script>document.addEventListener('DOMContentLoaded', init);</script>
</body>
</html>
