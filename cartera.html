<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080808">
<title>Dancab - Cartera</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/UI.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="app">

  <div class="screen on">
    <div class="topbar">
      <div style="font-weight:800;font-size:26px;color:var(--acc);letter-spacing:-0.5px;">Cartera</div>
    </div>

    <div class="scroll">
      
      <div class="card card-full">
        <div class="card-title">VALOR TOTAL</div>
        <div class="big-bal" id="port-total-main" style="font-size:36px;">€0,00</div>
        <div style="margin-top:8px;display:flex;gap:10px;align-items:center;">
           <span style="font-size:13px;color:var(--t2)">Invertido: <span id="port-inv-main" style="color:var(--t1)">€0,00</span></span>
           <span id="port-pnl-main" style="font-size:13px;font-weight:700;">+€0,00 (0%)</span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">POR TIPO</div>
        <div style="min-height: 250px; display: flex; flex-direction: column; align-items: center;">
            <div style="height: 160px; width: 100%; position: relative;">
                <canvas id="chart-type"></canvas>
            </div>
            <div id="legend-type"></div> 
        </div>
      </div>

      <div class="card">
        <div class="card-title">POR ACTIVO</div>
        <div style="min-height: 250px; display: flex; flex-direction: column; align-items: center;">
            <div style="height: 160px; width: 100%; position: relative;">
                <canvas id="chart-asset"></canvas>
            </div>
            <div id="legend-asset"></div> 
        </div>
      </div>

      <div class="card card-full">
        <div class="card-header">
            <span class="card-title" style="margin-bottom:0">TUS POSICIONES</span>
            <button class="btn btn-sm" style="background:var(--bg3); color:var(--t1); font-weight:700;" onclick="openModal('modal-add-stock')">+ Posición</button>
        </div>
        <div id="portfolio-list">
            <div style="text-align:center;color:var(--t3);padding:20px;font-size:14px;">Tu cartera está vacía</div>
        </div>
      </div>

    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">Inicio</span></button>
    <button class="nav-btn" onclick="window.location.href='calendario.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Calendario</span></button>
    <button class="nav-btn" onclick="window.location.href='finanzas.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span class="nav-label">Finanzas</span></button>
    <button class="nav-btn on" onclick="window.location.href='cartera.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">Cartera</span></button>
    <button class="nav-btn" onclick="window.location.href='gym.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M3 9h18M3 15h18"/></svg><span class="nav-label">Gym</span></button>
  </nav>

  <div class="overlay" id="modal-add-stock" onclick="closeModal('modal-add-stock',event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" style="margin-bottom:20px;">Nueva posición</div>
      
      <label class="form-label">Ticker</label>
      <input type="text" id="stock-ticker" class="form-input" placeholder="Ej: AAPL, VOO, BTC...">
      
      <label class="form-label">Nombre</label>
      <input type="text" id="stock-name" class="form-input" placeholder="Ej: Apple Inc.">
      
      <label class="form-label">Dinero Invertido (€)</label>
      <input type="number" id="stock-invested" class="form-input" placeholder="Ej: 50.00" step="0.01">
      
      <label class="form-label">Precio de compra (€)</label>
      <input type="number" id="stock-buy-price" class="form-input" placeholder="Ej: 10.00" step="0.01">
      
      <label class="form-label">Precio actual en mercado (€)</label>
      <input type="number" id="stock-current-price" class="form-input" placeholder="Ej: 15.00" step="0.01">
      
      <label class="form-label">Tipo</label>
      <select id="stock-type" class="form-input">
        <option value="Acción">Acción</option>
        <option value="ETF">ETF</option>
        <option value="Crypto">Crypto</option>
        <option value="Fondos">Fondos</option>
        <option value="Bonos">Bonos</option>
        <option value="Materias primas">Materias primas</option>
        <option value="Otro">Otro</option>
      </select>

      <button class="btn btn-primary" style="margin-top:16px; width:100%;" onclick="saveStock()">Crear Posición</button>
    </div>
  </div>

  <div class="overlay" id="modal-edit-stock" onclick="closeModal('modal-edit-stock',event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" style="margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
          <span>Editar posición</span>
          <button class="btn-danger" style="font-size:12px; padding:6px 10px;" onclick="deleteStock()">🗑️ Borrar</button>
      </div>
      
      <input type="hidden" id="edit-stock-id">

      <label class="form-label">Ticker</label>
      <input type="text" id="edit-stock-ticker" class="form-input">
      
      <label class="form-label">Nombre</label>
      <input type="text" id="edit-stock-name" class="form-input">
      
      <label class="form-label">Dinero Invertido (€)</label>
      <input type="number" id="edit-stock-invested" class="form-input" step="0.01">
      
      <label class="form-label">Precio de compra (€)</label>
      <input type="number" id="edit-stock-buy-price" class="form-input" step="0.01">
      
      <label class="form-label">Precio actual en mercado (€)</label>
      <input type="number" id="edit-stock-current-price" class="form-input" step="0.01">
      
      <label class="form-label">Tipo</label>
      <select id="edit-stock-type" class="form-input">
        <option value="Acción">Acción</option>
        <option value="ETF">ETF</option>
        <option value="Crypto">Crypto</option>
        <option value="Fondos">Fondos</option>
        <option value="Bonos">Bonos</option>
        <option value="Materias primas">Materias primas</option>
        <option value="Otro">Otro</option>
      </select>

      <button class="btn btn-primary" style="margin-top:16px; width:100%;" onclick="updateStock()">Guardar Cambios</button>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
</div>

<script src="js/main.js?v=56"></script>
<script src="js/cartera.js?v=56"></script>
<script>
    // Aseguramos que la función de deslizar modal se active en esta página
    document.addEventListener('DOMContentLoaded', () => {
        if (typeof setupSwipeToClose === 'function') {
            setupSwipeToClose();
        }
    });
</script>
</body>
</html>
