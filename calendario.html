<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080808">
<title>Dancab - Productividad</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/UI.css">
<style>
  /* Estilos específicos para el calendario y widgets */
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
  .cal-day-name { font-size: 11px; font-weight: 700; color: var(--t3); margin-bottom: 8px; }
  .cal-day { padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: 600; color: var(--t1); cursor: pointer; transition: 0.2s; }
  .cal-day.empty { visibility: hidden; }
  .cal-day.today { color: var(--acc); font-weight: 800; }
  .cal-day.selected { background: var(--acc); color: #fff; }
  .cal-day.has-task { position: relative; }
  .cal-day.has-task::after { content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: var(--acc); border-radius: 50%; }
  
  .pomo-timer { font-size: 48px; font-weight: 800; text-align: center; letter-spacing: -2px; margin: 10px 0; font-variant-numeric: tabular-nums; }
  .pomo-tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
  .pomo-tab { background: var(--bg4); color: var(--t2); border: none; padding: 6px 12px; border-radius: 12px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .pomo-tab.on { background: rgba(139, 92, 246, 0.2); color: #8b5cf6; }
  
  .check-circle { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--line); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .check-circle.checked { background: var(--acc); border-color: var(--acc); }
  .check-circle.checked::after { content: '✓'; color: #fff; font-size: 12px; font-weight: bold; }

  /* Pill Styles for Task Views */
  .pill-group { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
  .pill { background: var(--bg3); color: var(--t2); padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; border: none; }
  .pill.on { background: var(--acc); color: #fff; }

  /* Kanban Styles */
  .k-col { background: var(--bg2); border-radius: 12px; padding: 12px; margin-bottom: 16px; }
  .k-col-title { font-weight: 800; font-size: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; color: var(--t1); }
  .k-card { background: var(--bg3); border-radius: 8px; padding: 12px; margin-bottom: 8px; border: 1px solid var(--line); }
  .k-card-title { font-size: 14px; font-weight: 600; color: var(--t1); margin-bottom: 8px; }
  .k-card-footer { display: flex; justify-content: space-between; align-items: center; }

  /* Eisenhower Styles */
  .eis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .eis-quad { background: var(--bg2); border-radius: 12px; padding: 12px; border: 1px solid var(--line); }
  .eis-title { font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; color: var(--t2); display: flex; justify-content: space-between; align-items: center; }
  .eis-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--t1); padding: 6px 0; border-bottom: 1px solid var(--line); }
  .eis-item:last-child { border-bottom: none; }
</style>
</head>
<body>
<div class="app">

  <div class="screen on">
    <!-- TOPBAR -->
    <div class="topbar">
      <div style="font-weight:800;font-size:26px;color:var(--acc);letter-spacing:-0.5px;">Productividad</div>
    </div>

    <div class="scroll" style="padding-bottom: 90px;">

      <!-- SELECTOR DE VISTAS (PILLS) -->
      <div class="pill-group" id="s-tareas">
        <button class="pill on" onclick="switchTaskView('agenda', this)">Agenda Diaria</button>
        <button class="pill" onclick="switchTaskView('kanban', this)">Kanban</button>
        <button class="pill" onclick="switchTaskView('eisenhower', this)">Matriz Eisenhower</button>
      </div>

      <!-- VISTA: AGENDA DIARIA -->
      <div id="tv-agenda">
          <!-- 1. CALENDARIO MENSUAL -->
          <div class="card card-full">
            <div class="cal-header">
                <button class="btn btn-sm" style="background:var(--bg3); color:var(--t1);" onclick="changeMonth(-1)">◀</button>
                <div id="cal-month-year" style="font-weight:800; font-size:16px; text-transform:capitalize;">Mes Año</div>
                <button class="btn btn-sm" style="background:var(--bg3); color:var(--t1);" onclick="changeMonth(1)">▶</button>
            </div>
            <div class="cal-grid">
                <div class="cal-day-name">L</div><div class="cal-day-name">M</div><div class="cal-day-name">X</div><div class="cal-day-name">J</div><div class="cal-day-name">V</div><div class="cal-day-name">S</div><div class="cal-day-name">D</div>
            </div>
            <div class="cal-grid" id="cal-days"></div>
          </div>

          <!-- ETIQUETA DEL DÍA SELECCIONADO -->
          <div style="margin: 20px 0 10px 4px; font-weight:800; font-size:18px; color:var(--t1);" id="selected-date-label">Hoy</div>

          <!-- 2. POMODORO (FOCUS TIME) -->
          <div class="card card-full" style="background: linear-gradient(145deg, rgba(30,30,35,1) 0%, rgba(20,20,25,1) 100%); border: 1px solid rgba(139, 92, 246, 0.3);">
            <div class="card-title" style="color: #8b5cf6;" id="pomo-label">ENFOQUE</div>
            <div class="pomo-tabs" id="tv-pomo">
                <button class="pomo-tab on pill" onclick="setPomoMode('focus', this)">Pomodoro</button>
                <button class="pomo-tab pill" onclick="setPomoMode('short', this)">Corto</button>
                <button class="pomo-tab pill" onclick="setPomoMode('long', this)">Largo</button>
            </div>
            <div class="pomo-timer" id="pomo-display">25:00</div>
            <div style="text-align:center; font-size:12px; color:var(--t3); margin-bottom:16px;">Sesiones: <span id="pomo-sessions" style="color:var(--t1); font-weight:bold;">0</span></div>
            <div style="display:flex; justify-content:center; gap:12px;">
                <button class="btn" style="background:#8b5cf6; color:#fff; font-weight:700; padding:10px 24px; border-radius:20px;" id="pomo-play" onclick="togglePomo()">▶</button>
                <button class="btn" style="background:var(--bg4); color:var(--t1); font-weight:700; padding:10px 16px; border-radius:20px;" onclick="resetPomo()">↻</button>
            </div>
          </div>

          <!-- 3. TAREAS DEL DÍA (GOALS) -->
          <div class="card card-full">
            <div class="card-header" style="margin-bottom:12px;">
                <span class="card-title" style="margin-bottom:0;">TAREAS DEL DÍA</span>
                <button class="btn btn-sm" style="background:var(--bg3); color:var(--t1);" onclick="openModal('modal-task')">+ Tarea</button>
            </div>
            <div id="tasks-list"></div>
          </div>

          <!-- 4. HÁBITOS (HABIT TRACKING) -->
          <div class="card card-full">
            <div class="card-header" style="margin-bottom:12px;">
                <span class="card-title" style="margin-bottom:0;">TUS HÁBITOS</span>
                <button class="btn btn-sm" style="background:var(--bg3); color:var(--t1);" onclick="openModal('modal-habit')">+ Hábito</button>
            </div>
            <div id="habits-list"></div>
          </div>

          <!-- 5. REFLEXIÓN DIARIA Y NOTAS -->
          <div class="card card-full">
            <div class="card-title">REFLEXIÓN / NOTAS DEL DÍA</div>
            <textarea id="daily-notes" class="form-input" style="min-height: 120px; resize: none; margin-bottom:0;" placeholder="¿Qué tal ha ido el día? Apunta ideas, reuniones o pensamientos..." oninput="saveDailyNotes()"></textarea>
          </div>
      </div>

      <!-- VISTA: KANBAN -->
      <div id="tv-kanban" style="display:none;">
          <div class="k-col">
              <div class="k-col-title">POR HACER <button class="btn-sm" style="background:var(--bg3); color:var(--t1); border:none; padding:4px 8px; border-radius:6px;" onclick="openModalKanban('todo')">+</button></div>
              <div id="k-todo"></div>
          </div>
          <div class="k-col">
              <div class="k-col-title">EN PROGRESO <button class="btn-sm" style="background:var(--bg3); color:var(--t1); border:none; padding:4px 8px; border-radius:6px;" onclick="openModalKanban('doing')">+</button></div>
              <div id="k-doing"></div>
          </div>
          <div class="k-col">
              <div class="k-col-title">HECHO <button class="btn-sm" style="background:var(--bg3); color:var(--t1); border:none; padding:4px 8px; border-radius:6px;" onclick="openModalKanban('done')">+</button></div>
              <div id="k-done"></div>
          </div>
      </div>

      <!-- VISTA: EISENHOWER -->
      <div id="tv-eisenhower" style="display:none;">
          <div class="eis-grid">
              <div class="eis-quad" style="border-color: rgba(231, 76, 60, 0.3);">
                  <div class="eis-title" style="color:#e74c3c;">URGENTE + IMP <button class="btn-sm" style="background:transparent; color:#e74c3c; border:none;" onclick="openModalEis('ui')">+</button></div>
                  <div id="eis-ui"></div>
              </div>
              <div class="eis-quad" style="border-color: rgba(59, 130, 246, 0.3);">
                  <div class="eis-title" style="color:#3b82f6;">NO URG + IMP <button class="btn-sm" style="background:transparent; color:#3b82f6; border:none;" onclick="openModalEis('ni')">+</button></div>
                  <div id="eis-ni"></div>
              </div>
              <div class="eis-quad" style="border-color: rgba(245, 158, 11, 0.3);">
                  <div class="eis-title" style="color:#f59e0b;">URG + NO IMP <button class="btn-sm" style="background:transparent; color:#f59e0b; border:none;" onclick="openModalEis('un')">+</button></div>
                  <div id="eis-un"></div>
              </div>
              <div class="eis-quad" style="border-color: rgba(149, 165, 166, 0.3);">
                  <div class="eis-title" style="color:#95a5a6;">NO URG + NO IMP <button class="btn-sm" style="background:transparent; color:#95a5a6; border:none;" onclick="openModalEis('nn')">+</button></div>
                  <div id="eis-nn"></div>
              </div>
          </div>
      </div>

    </div>
  </div>

  <!-- NAVEGACIÓN -->
  <nav class="nav">
    <button class="nav-btn" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">Inicio</span></button>
    <button class="nav-btn on" onclick="window.location.href='calendario.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Agenda</span></button>
    <button class="nav-btn" onclick="window.location.href='finanzas.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span class="nav-label">Finanzas</span></button>
    <button class="nav-btn" onclick="window.location.href='cartera.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">Cartera</span></button>
    <button class="nav-btn" onclick="window.location.href='gym.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M3 9h18M3 15h18"/></svg><span class="nav-label">Gym</span></button>
  </nav>

  <!-- MODAL: AÑADIR TAREA -->
  <div class="overlay" id="modal-task" onclick="closeModal('modal-task',event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" style="margin-bottom:20px;">Nueva Tarea</div>
      <label class="form-label">¿Qué quieres lograr?</label>
      <input type="text" id="t-name" class="form-input" placeholder="Ej: Terminar proyecto, Enviar email...">
      <label class="form-label">Categoría</label>
      <select id="t-cat" class="form-input">
          <option value="Trabajo">Trabajo</option>
          <option value="Personal">Personal</option>
          <option value="Estudio">Estudio</option>
          <option value="Otro">Otro</option>
      </select>
      <label class="form-label">Hora (Opcional)</label>
      <input type="time" id="t-time" class="form-input">
      <!-- Hidden date input, set by JS based on selected calendar date -->
      <input type="hidden" id="t-date">
      <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="addTask()">Guardar Tarea</button>
    </div>
  </div>

  <!-- MODAL: AÑADIR HÁBITO GLOBAL -->
  <div class="overlay" id="modal-habit" onclick="closeModal('modal-habit',event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" style="margin-bottom:20px;">Nuevo Hábito</div>
      <label class="form-label">Nombre del hábito</label>
      <input type="text" id="habit-text" class="form-input" placeholder="Ej: Leer 10 páginas, Beber agua...">
      <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="addHabit()">Crear Hábito</button>
    </div>
  </div>

  <!-- MODAL: KANBAN -->
  <div class="overlay" id="modal-kanban" onclick="closeModal('modal-kanban',event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modal-kanban-title" style="margin-bottom:20px;">Añadir Kanban</div>
      <input type="hidden" id="k-col-target">
      <label class="form-label">Título</label>
      <input type="text" id="k-title" class="form-input" placeholder="...">
      <label class="form-label">Categoría</label>
      <select id="k-cat" class="form-input">
          <option value="Trabajo">Trabajo</option>
          <option value="Personal">Personal</option>
          <option value="Estudio">Estudio</option>
          <option value="Otro">Otro</option>
      </select>
      <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="addKanbanCard()">Guardar</button>
    </div>
  </div>

  <!-- MODAL: EISENHOWER -->
  <div class="overlay" id="modal-eis" onclick="closeModal('modal-eis',event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title" id="modal-eis-title" style="margin-bottom:20px;">Añadir Eisenhower</div>
      <input type="hidden" id="eis-quad-target">
      <label class="form-label">Tarea</label>
      <input type="text" id="eis-task-text" class="form-input" placeholder="...">
      <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="addEisTask()">Guardar</button>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
</div>

<script src="js/main.js?v=71"></script>
<script src="js/calendario.js?v=71"></script>
</body>
</html>
