<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080808">
<title>Dancab - Gym</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/UI.css">
</head>
<body>
<div class="app">

  <div class="screen on">
    <div class="topbar">
      <span class="page-title">Gym</span>
    </div>
    
    <div class="scroll">
      
      <!-- PESTAÑAS (Ocupan todo el ancho superior) -->
      <div class="fin-tabs card-full" style="display:flex; gap:10px; margin-bottom:10px; grid-column: 1 / -1;">
        <button class="fin-tab on" onclick="switchGymTab('rutinas', this)">Rutinas</button>
        <button class="fin-tab" onclick="switchGymTab('records', this)">Récords</button>
      </div>

      <!-- ================= PESTAÑA: RUTINAS ================= -->
      
      <!-- CONTENEDOR DEL ENTRENO ACTIVO (Aparece solo cuando inicias uno) -->
      <div class="card tab-rutinas-item" id="active-workout-container" style="display:none; border: 1px solid var(--acc);"></div>

      <!-- LISTA DE RUTINAS -->
      <div class="card tab-rutinas-item">
         <div class="card-header">
            <span class="card-title">Tus Rutinas</span>
            <button class="btn btn-sm" onclick="openModal('modal-routine')">+ Rutina</button>
         </div>
         <div id="gym-routine-list"><div class="empty">Cargando...</div></div>
      </div>

      <!-- HISTORIAL DE ENTRENAMIENTOS -->
      <div class="card tab-rutinas-item">
         <div class="card-title">DÍAS DE ENTRENAMIENTO 🗓️</div>
         <div id="gym-workout-log"><div class="empty">Sin entrenamientos aún</div></div>
      </div>

      <!-- ================= PESTAÑA: RÉCORDS ================= -->
      
      <!-- LISTA DE PRs -->
      <div class="card tab-records-item" style="display:none;">
         <div class="card-title">Tus Récords (PRs) 🏆</div>
         <div id="gym-records-list"><div class="empty">Cargando...</div></div>
      </div>

    </div>
  </div>

  <!-- NAVEGACIÓN INFERIOR -->
  <nav class="nav">
    <button class="nav-btn" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">Inicio</span></button>
    <button class="nav-btn" onclick="window.location.href='calendario.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Calendario</span></button>
    <button class="nav-btn" onclick="window.location.href='finanzas.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span class="nav-label">Finanzas</span></button>
    <button class="nav-btn" onclick="window.location.href='cartera.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">Cartera</span></button>
    <button class="nav-btn on" onclick="window.location.href='gym.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M3 9h18M3 15h18"/></svg><span class="nav-label">Gym</span></button>
  </nav>

  <!-- MODAL: NUEVA RUTINA -->
  <div class="overlay" id="modal-routine" onclick="closeModal('modal-routine',event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Nueva Rutina</div>
      <div class="form-label">Nombre de la rutina</div>
      <input type="text" id="rt-name" placeholder="Ej: Empuje, Pierna, Pecho...">
      <div class="form-label" style="margin-top:12px;">Ejercicios (separados por coma)</div>
      <input type="text" id="rt-exercises" placeholder="Press banca, Fondos, Extensiones...">
      <button class="btn btn-primary" style="margin-top:16px;" onclick="addRoutine()">Guardar Rutina</button>
    </div>
  </div>

  <!-- MODAL: CONFIRMACIÓN GENÉRICA -->
  <div class="overlay" id="modal-confirm" onclick="cancelConfirm(event)">
    <div class="modal" style="padding-bottom: 24px;">
      <div class="modal-handle"></div>
      <div class="modal-title" id="confirm-title" style="color: var(--red);">¿Estás seguro?</div>
      <div class="form-label" id="confirm-message" style="margin-bottom: 20px; text-transform: none; font-size: 14px; color: var(--t1); letter-spacing: normal;">¿Quieres borrar esto?</div>
      <div class="form-row">
        <button class="btn" style="background:var(--bg3); color:var(--t1);" onclick="cancelConfirm(event, true)">Cancelar</button>
        <button class="btn" style="background:var(--red); color:#fff;" onclick="executeConfirm()">Borrar</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
</div>
<script src="js/main.js?v=22"></script>
<script src="js/gym.js?v=22"></script>
<script>document.addEventListener('DOMContentLoaded', renderGymInit);</script>
</body>
</html>
