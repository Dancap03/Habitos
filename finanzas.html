<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080808">
<title>Dancab - Gym</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/UI.css">
<style>
  .gym-tabs { display: flex; gap: 10px; margin-bottom: 16px; overflow-x: auto; }
  .gym-tab { background: var(--bg3); color: var(--t2); border: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; white-space: nowrap; }
  .gym-tab.on { background: var(--acc); color: #fff; }
  .form-input { width: 100%; padding: 12px; background: var(--bg3); border: 1px solid var(--line); border-radius: 10px; color: var(--t1); font-family: inherit; font-size: 14px; box-sizing: border-box; margin-top: 6px; }
  .form-input:focus { outline: none; border-color: var(--acc); }
</style>
</head>
<body>
<div class="app">

  <div class="screen on">
    <div class="topbar">
      <span class="page-title">Gym</span>
    </div>
    
    <div class="scroll">
      
      <!-- PESTAÑAS -->
      <div class="gym-tabs card-full" style="grid-column: 1 / -1;">
        <button class="gym-tab on" onclick="switchGymTab('rutinas', this)">Rutinas</button>
        <button class="gym-tab" onclick="switchGymTab('records', this)">Récords</button>
      </div>

      <!-- ================= PESTAÑA: RUTINAS ================= -->
      
      <div id="active-workout-container" class="tab-rutinas-item" style="display:none; grid-column: 1 / -1; margin-bottom:14px;"></div>

      <div class="card tab-rutinas-item">
         <div class="card-header">
            <span class="card-title">Tus Rutinas Base</span>
            <button class="btn btn-sm" onclick="openRoutineModal()">+ Rutina</button>
         </div>
         <div id="gym-routine-list"><div class="empty">Cargando...</div></div>
      </div>

      <div class="card tab-rutinas-item">
         <div class="card-title">DÍAS DE ENTRENAMIENTO 🗓️</div>
         <div id="gym-workout-log"><div class="empty">Sin entrenamientos aún</div></div>
      </div>

      <!-- ================= PESTAÑA: RÉCORDS ================= -->
      
      <div class="card tab-records-item" style="display:none; grid-column: 1 / -1;">
         <div class="card-title">Tus Récords (PRs) 🏆</div>
         <div id="gym-records-list"><div class="empty">Cargando...</div></div>
      </div>

    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn" onclick="window.location.href='index.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">Inicio</span></button>
    <button class="nav-btn" onclick="window.location.href='calendario.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="nav-label">Calendario</span></button>
    <button class="nav-btn" onclick="window.location.href='finanzas.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg><span class="nav-label">Finanzas</span></button>
    <button class="nav-btn" onclick="window.location.href='cartera.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="nav-label">Cartera</span></button>
    <button class="nav-btn on" onclick="window.location.href='gym.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 5v14M18 5v14M3 9h18M3 15h18"/></svg><span class="nav-label">Gym</span></button>
  </nav>

  <!-- MODAL: CREADOR DE RUTINA -->
  <div class="overlay" id="modal-routine" onclick="closeModal('modal-routine',event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Nueva Rutina</div>
      
      <input type="text" id="rt-name" class="form-input" placeholder="Nombre (Ej: Empuje, Cinta de correr...)">

      <div class="form-label" style="margin-top:16px;">¿Qué tipo de entrenamiento es?</div>
      <select id="rt-main-type" class="form-input" onchange="toggleRtMainType()">
        <option value="pesas">Pesas (Varios ejercicios)</option>
        <option value="cardio">Solo Cardio</option>
      </select>

      <!-- Contenedor si elige PESAS -->
      <div id="rt-pesas-container" style="margin-top:20px; padding-top:16px; border-top:1px solid var(--line);">
          <div style="font-size:12px; font-weight:700; color:var(--acc); margin-bottom:8px;">AÑADIR EJERCICIOS A LA LISTA</div>
          
          <input type="text" id="rt-ex-name" class="form-input" placeholder="Ejercicio (Ej: Press banca...)">
          <input type="number" id="rt-ex-sets" class="form-input" placeholder="Número de series (Ej: 4)" min="1">

          <button class="btn btn-sm" style="background:var(--bg4); width:100%; margin-top:12px; color:var(--t1);" onclick="addRtEx()">+ Añadir a la lista</button>
          
          <div id="rt-ex-list" style="margin-top:16px; display:flex; flex-direction:column; gap:8px;"></div>
      </div>

      <!-- Contenedor si elige CARDIO -->
      <div id="rt-cardio-container" style="display:none; margin-top:20px; padding-top:16px; border-top:1px solid var(--line);">
          <div style="font-size:12px; font-weight:700; color:var(--acc); margin-bottom:8px;">CONFIGURAR CARDIO</div>
          <input type="text" id="rt-cardio-unit" class="form-input" placeholder="¿Qué mides? (Ej: km, min, kcal...)">
      </div>

      <button class="btn btn-primary" style="margin-top:24px; width:100%;" onclick="addRoutine()">Guardar Rutina</button>
    </div>
  </div>

  <!-- MODAL: AÑADIR EJERCICIO EXTRA (DENTRO DEL ENTRENO) -->
  <div class="overlay" id="modal-exercise" onclick="closeModal('modal-exercise',event)">
    <div class="modal">
      <div class="modal-handle"></div>
      <div class="modal-title">Añadir Ejercicio Extra</div>
      <select id="ex-type" class="form-input" onchange="toggleExerciseType()">
        <option value="pesas">Pesas / Fuerza</option>
        <option value="cardio">Cardio / Resistencia</option>
      </select>
      <input type="text" id="ex-name" class="form-input" placeholder="Ej: Curl bíceps, Elíptica...">
      <div id="ex-unit-container" style="display:none;">
        <input type="text" id="ex-unit" class="form-input" placeholder="Ej: km, cal, min...">
      </div>
      <button class="btn btn-primary" style="margin-top:20px;" onclick="addExerciseToWorkout()">Añadir al entreno</button>
    </div>
  </div>

  <div class="overlay" id="modal-confirm" onclick="cancelConfirm(event)">
    <div class="modal" style="padding-bottom: 24px;">
      <div class="modal-handle"></div>
      <div class="modal-title" id="confirm-title" style="color: var(--red);">¿Estás seguro?</div>
      <div class="form-label" id="confirm-message" style="margin-bottom: 20px; text-transform: none; font-size: 14px; color: var(--t1); letter-spacing: normal;">¿Quieres borrar esto?</div>
      <div class="form-row">
        <button class="btn" style="background:var(--bg3); color:var(--t1);" onclick="cancelConfirm(event, true)">Cancelar</button>
        <button class="btn" style="background:var(--red); color:#fff;" onclick="executeConfirm()">Borrar</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
</div>
<script src="js/main.js?v=25"></script>
<script src="js/gym.js?v=25"></script>
<script>document.addEventListener('DOMContentLoaded', renderGymInit);</script>
</body>
</html>
